services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: appfit
      POSTGRES_PASSWORD: appfit
      POSTGRES_DB: appfit
    ports:
      - "5432:5432"
    volumes:
      - appfit_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - appfit_redis_data:/data

volumes:
  appfit_postgres_data:
  appfit_redis_data:
